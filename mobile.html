<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>BUILDER OS — Mobile</title>
<script>(function(){try{var s=localStorage.getItem('builderos-theme');var t=s||((window.matchMedia&&matchMedia('(prefers-color-scheme: light)').matches)?'light':'dark');document.documentElement.setAttribute('data-theme',t);}catch(e){document.documentElement.setAttribute('data-theme','dark');}})();</script>
<meta name="theme-color" content="#0A0F15">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="BUILDER OS">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="assets/icons/favicon.ico" sizes="any">
<link rel="icon" type="image/png" sizes="32x32" href="assets/icons/favicon-32.png">
<link rel="apple-touch-icon" href="assets/icons/apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0A0F15; --panel:#131D28; --panel-2:#1A2734; --panel-3:#21303F;
    --line:#2A3B4C; --line-dim:#1E2C39;
    --cyan:#38C0EC; --cyan-2:#1E9FD0; --cyan-soft:rgba(56,192,236,0.14);
    --amber:#ECB04A; --amber-soft:rgba(236,176,74,0.16); --red:#F0635A; --red-soft:rgba(240,99,90,0.16); --green:#3FD389; --green-soft:rgba(63,211,137,0.16);
    --text:#EAF1F7; --text-dim:#A6B7C5; --text-faint:#75889A;
    --ring-ok:#38C0EC; --ring-decay:#ECB04A; --ring-crit:#F0635A; --ring-hero:#38C0EC;
    --ring-track:rgba(255,255,255,0.07); --hit-glow:rgba(56,192,236,0.45);
    --body-glow:rgba(56,192,236,0.12); --hero-glow:rgba(56,192,236,0.14); --txt-glow:rgba(56,192,236,0.5); --num-glow:rgba(56,192,236,0.4);
    --heat-0:rgba(255,255,255,0.04); --heat-1:rgba(56,192,236,0.45); --heat-2:#38C0EC;
    --elev-1:0 2px 10px rgba(0,0,0,0.35); --elev-2:0 10px 30px rgba(0,0,0,0.45); --elev-dock:0 12px 36px rgba(0,0,0,0.55);
    --glow-cyan:0 0 0 1px rgba(56,192,236,0.22),0 0 24px rgba(56,192,236,0.16);
    --tab-ink:#06222E; --dock-bg:rgba(19,29,40,0.92);
    --mono:'IBM Plex Mono',monospace; --sans:'IBM Plex Sans',sans-serif;
    --s1:4px;--s2:8px;--s3:12px;--s4:16px;--s5:24px;--s6:32px;
    --fs-input:16px; --fs-2xl:38px;
    --r-sm:10px;--r-md:16px;--r-lg:22px;--r-xl:28px;--r-pill:999px;
    --tap:46px; --dock-h:64px; --dock-gap:16px; --safe-b:env(safe-area-inset-bottom,0px);
  }
  [data-theme="light"] {
    --bg:#EAF0F5; --panel:#FFFFFF; --panel-2:#F1F5F9; --panel-3:#E7EEF4;
    --line:#D3DDE6; --line-dim:#E4EBF1;
    --cyan:#0E7EA8; --cyan-2:#0A6E92; --cyan-soft:rgba(14,126,168,0.10);
    --amber:#B8721A; --amber-soft:rgba(184,114,26,0.14); --red:#C0392B; --red-soft:rgba(192,57,43,0.12); --green:#2E8B57; --green-soft:rgba(46,139,87,0.14);
    --text:#17222E; --text-dim:#4C5A66; --text-faint:#5E6C78;
    --ring-ok:#0E7EA8; --ring-decay:#B8721A; --ring-crit:#C0392B; --ring-hero:#0E7EA8;
    --ring-track:rgba(20,40,60,0.12); --hit-glow:rgba(14,126,168,0.35);
    --body-glow:rgba(14,126,168,0.07); --hero-glow:rgba(14,126,168,0.09); --txt-glow:transparent; --num-glow:transparent;
    --heat-0:rgba(20,40,60,0.05); --heat-1:rgba(14,126,168,0.4); --heat-2:#0E7EA8;
    --elev-1:0 1px 3px rgba(20,40,60,0.08); --elev-2:0 6px 20px rgba(20,40,60,0.10); --elev-dock:0 10px 30px rgba(20,40,60,0.16);
    --glow-cyan:0 0 0 1px rgba(14,126,168,0.25),0 0 16px rgba(14,126,168,0.10);
    --tab-ink:#FFFFFF; --dock-bg:rgba(255,255,255,0.92);
  }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { margin:0; color:var(--text); font-family:var(--sans); font-size:15px; line-height:1.45; min-height:100vh;
    background: radial-gradient(700px 380px at 50% -6%, var(--body-glow), transparent 60%), var(--bg);
    background-attachment:fixed; transition:background 0.3s ease, color 0.3s ease;
    padding-bottom: calc(var(--dock-h) + var(--dock-gap) + var(--safe-b) + var(--s5)); }
  a { color:var(--cyan); text-decoration:none; }
  :focus-visible { outline:2px solid var(--cyan); outline-offset:3px; border-radius:6px; }
  .wrap { max-width:480px; margin:0 auto; padding:var(--s3) var(--s3) 0; }

  .hero { background:linear-gradient(160deg, var(--panel) 0%, color-mix(in srgb, var(--panel) 72%, #000) 100%); border:1px solid var(--line); border-radius:var(--r-xl); padding:var(--s5) var(--s4) var(--s4); margin-bottom:var(--s4); position:relative; overflow:hidden; box-shadow:var(--elev-2); }
  .hero::before { content:""; position:absolute; inset:0; border-radius:inherit; pointer-events:none; background:radial-gradient(300px 180px at 50% 0%, var(--hero-glow), transparent 70%); }
  .hero-top { display:flex; align-items:center; justify-content:space-between; position:relative; z-index:1; margin-bottom:var(--s4); }
  .wordmark { font-family:var(--mono); font-weight:700; font-size:16px; letter-spacing:0.05em; }
  .wordmark span { color:var(--cyan); text-shadow:0 0 16px var(--txt-glow); }
  .sync-date { font-family:var(--mono); font-size:9.5px; color:var(--text-faint); margin-top:3px; }
  .boot-line { font-family:var(--mono); font-size:10px; color:var(--cyan); margin-top:3px; display:none; }
  .boot-line::after { content:"▌"; margin-left:2px; animation:blink 1s step-end infinite; }
  @keyframes blink { 50% { opacity:0; } }
  body.is-loading .boot-line { display:block; } body.is-loading .sync-date { display:none; }
  .head-btns { display:flex; align-items:center; gap:8px; }
  .icon-btn { background:var(--panel-2); border:1px solid var(--line); color:var(--cyan); font-size:17px; width:var(--tap); height:var(--tap); border-radius:var(--r-pill); display:inline-flex; align-items:center; justify-content:center; cursor:pointer; }
  .icon-btn:active { box-shadow:var(--glow-cyan); }
  body.is-loading #refreshBtn { animation:spin 0.9s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
  @media (prefers-reduced-motion: reduce) { body.is-loading #refreshBtn { animation:none; } .boot-line::after { animation:none; } }

  .hero-ring-wrap { position:relative; width:150px; height:150px; margin:0 auto; z-index:1; }
  .hero-center { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; }
  .hero-level { font-family:var(--mono); font-size:46px; font-weight:700; line-height:1; text-shadow:0 0 22px var(--num-glow); }
  .hero-title { font-family:var(--mono); font-size:10px; letter-spacing:0.16em; text-transform:uppercase; color:var(--cyan); margin-top:4px; }
  .hero-sub { font-family:var(--mono); font-size:9px; letter-spacing:0.12em; text-transform:uppercase; color:var(--text-faint); margin-top:2px; }
  .tier-next { position:relative; z-index:1; text-align:center; margin-top:var(--s3); font-family:var(--mono); font-size:10px; letter-spacing:0.1em; text-transform:uppercase; color:var(--text-dim); }
  .tier-next .lock { opacity:0.6; margin-right:3px; }
  .tier-next #nextTier { color:var(--text); }
  .tier-next #nextPts { color:var(--cyan); }

  .ring-svg .ring-track { stroke:var(--ring-track); }
  .ring-svg .ring-prog { transform:rotate(-90deg); transform-origin:50% 50%; transition:stroke-dashoffset 1.1s cubic-bezier(.34,1.4,.5,1); filter:drop-shadow(0 0 5px var(--glow)); }
  @media (prefers-reduced-motion: reduce) { .ring-svg .ring-prog { transition:none; } }
  .ring-svg .ring-tick { stroke:var(--text-faint); opacity:0.55; }

  .section-label { font-family:var(--mono); font-size:10px; letter-spacing:0.14em; text-transform:uppercase; color:var(--text-faint); margin:var(--s5) 0 var(--s3); display:flex; align-items:center; gap:var(--s2); }
  .section-label::before { content:""; width:7px; height:7px; border-radius:50%; background:var(--cyan); box-shadow:0 0 9px var(--cyan); }

  .view { display:none; } .view.active { display:block; }

  .alarm-strip { border:1px solid var(--line); background:var(--panel); border-radius:var(--r-lg); padding:var(--s3) var(--s4); display:flex; align-items:center; gap:var(--s2); flex-wrap:wrap; box-shadow:var(--elev-1); margin-bottom:var(--s2); }
  .alarm-strip.nominal { border-color:var(--green-soft); }
  .alarm-strip.active { border-color:var(--amber-soft); box-shadow:0 0 24px var(--amber-soft); }
  .alarm-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
  .alarm-strip.nominal .alarm-dot { background:var(--green); box-shadow:0 0 10px var(--green); }
  .alarm-strip.active .alarm-dot { background:var(--amber); box-shadow:0 0 10px var(--amber); animation:pulse 1.6s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.55;} }
  @media (prefers-reduced-motion: reduce) { .alarm-strip.active .alarm-dot { animation:none; } }
  .alarm-label { font-family:var(--mono); font-size:10.5px; letter-spacing:0.1em; text-transform:uppercase; color:var(--text-dim); }
  .alarm-strip.nominal .alarm-label { color:var(--green); }
  .alarm-chip { font-family:var(--mono); font-size:10px; background:var(--amber-soft); color:var(--amber); border:1px solid var(--amber-soft); padding:3px 9px; border-radius:var(--r-pill); }

  .ring-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:var(--s2); }
  .ring-cell { background:var(--panel); border:1px solid var(--line); border-radius:var(--r-lg); padding:var(--s3) var(--s1); text-align:center; position:relative; box-shadow:var(--elev-1); }
  .ring-cell.flag-decay { border-color:var(--amber-soft); }
  .ring-cell.flag-critical { border-color:var(--red-soft); box-shadow:0 0 18px var(--red-soft); }
  .ring-cell.ring-hit { animation:ringHit 0.9s ease; }
  @keyframes ringHit { 0%,100%{ box-shadow:var(--elev-1); transform:none; } 40%{ box-shadow:0 0 26px var(--hit-glow); transform:scale(1.04); } }
  @media (prefers-reduced-motion: reduce) { .ring-cell.ring-hit { animation:none; } }
  .ring-wrap { position:relative; width:78px; height:78px; margin:0 auto; }
  .ring-center { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; }
  .ring-val { font-family:var(--mono); font-size:20px; font-weight:700; }
  .ring-cell.flag-decay .ring-val { color:var(--amber); }
  .ring-cell.flag-critical .ring-val { color:var(--red); }
  .ring-label { font-family:var(--mono); font-size:10px; letter-spacing:0.1em; color:var(--text-dim); margin-top:var(--s2); }
  .ring-flag { position:absolute; top:7px; right:9px; font-family:var(--mono); font-size:10px; font-weight:700; line-height:1; }
  .ring-flag.decay { color:var(--amber); } .ring-flag.crit { color:var(--red); }

  .card { border:1px solid var(--line); background:var(--panel); border-radius:var(--r-lg); padding:var(--s4); box-shadow:var(--elev-1); }

  .water-readout { text-align:center; padding:var(--s2) 0; }
  .water-total { font-family:var(--mono); font-size:var(--fs-2xl); font-weight:700; color:var(--cyan); text-shadow:0 0 24px var(--num-glow); }
  .water-total .tunit { font-size:16px; color:var(--text-faint); margin-left:3px; text-shadow:none; }
  .water-goal-label { font-size:11px; color:var(--text-dim); margin-top:2px; }
  .water-bar-track { height:12px; background:var(--panel-3); border-radius:var(--r-pill); overflow:hidden; margin-top:var(--s3); }
  .water-bar-fill { height:100%; width:0%; border-radius:var(--r-pill); background:linear-gradient(90deg, var(--cyan-2), var(--cyan)); box-shadow:0 0 14px var(--cyan-soft); transition:width 0.6s cubic-bezier(.34,1.3,.5,1); }
  @media (prefers-reduced-motion: reduce) { .water-bar-fill { transition:none; } }

  .quick-btn-row { display:flex; gap:var(--s2); margin-top:var(--s4); flex-wrap:wrap; }
  .qbtn { flex:1; min-width:92px; font-family:var(--mono); font-size:var(--fs-input); letter-spacing:0.03em; background:var(--panel-2); border:1px solid var(--line); color:var(--cyan); padding:0 10px; min-height:var(--tap); border-radius:var(--r-pill); cursor:pointer; text-align:center; transition:all 0.16s ease; }
  .qbtn:active { box-shadow:var(--glow-cyan); }
  .qbtn.confirm { border-color:var(--green-soft); color:var(--green); }

  .field-row { display:flex; gap:var(--s2); margin-top:var(--s3); }
  .field { display:flex; flex-direction:column; gap:var(--s1); flex:1; min-width:0; }
  .field label { font-family:var(--mono); font-size:9.5px; letter-spacing:0.05em; text-transform:uppercase; color:var(--text-faint); }
  .field input { background:var(--panel-2); border:1px solid var(--line); color:var(--text); font-family:var(--sans); font-size:var(--fs-input); padding:0 12px; min-height:var(--tap); border-radius:var(--r-md); }
  .field input::placeholder { color:var(--text-faint); }
  .field input:focus { border-color:var(--cyan); outline:none; box-shadow:0 0 0 3px var(--cyan-soft); }

  .task-row { display:flex; align-items:center; gap:var(--s2); padding:var(--s3) 0; border-bottom:1px solid var(--line-dim); }
  .task-row:last-child { border-bottom:none; }
  .task-domain { font-family:var(--mono); font-size:9px; letter-spacing:0.05em; color:var(--cyan); background:var(--cyan-soft); border:1px solid var(--cyan-soft); padding:4px 8px; border-radius:var(--r-pill); flex-shrink:0; }
  .task-name { flex:1; font-size:14px; min-width:0; color:var(--text); }
  .task-due { font-family:var(--mono); font-size:10px; color:var(--text-faint); flex-shrink:0; }
  .task-due.overdue { color:var(--red); font-weight:600; }
  .task-done-btn { font-family:var(--mono); font-size:11px; background:var(--panel-2); border:1px solid var(--green-soft); color:var(--green); padding:0 14px; min-height:var(--tap); min-width:60px; flex-shrink:0; border-radius:var(--r-pill); cursor:pointer; }
  .task-done-btn:active { box-shadow:0 0 18px var(--green-soft); }
  .task-done-btn.done { border-color:var(--line); color:var(--text-faint); cursor:default; }

  .alc-row { display:flex; align-items:center; gap:var(--s2); padding:var(--s3) 0; border-bottom:1px solid var(--line-dim); font-size:13px; }
  .alc-row:last-child { border-bottom:none; }
  .alc-date { font-family:var(--mono); font-size:10px; color:var(--text-faint); width:50px; flex-shrink:0; }
  .alc-type { flex:1; min-width:0; color:var(--text); }
  .alc-units { font-family:var(--mono); font-size:12px; color:var(--cyan); flex-shrink:0; }

  .msg { font-family:var(--mono); font-size:11px; color:var(--text-dim); padding:var(--s4); text-align:center; }
  .task-filter { display:flex; gap:var(--s2); margin-bottom:var(--s2); }
  .task-filter input[type=search] { flex:1; min-width:0; background:var(--panel-2); border:1px solid var(--line); color:var(--text); font-size:var(--fs-input, 15px); padding:0 12px; min-height:var(--tap); border-radius:var(--r-pill); }
  .task-filter input[type=search]::placeholder { color:var(--text-faint); }
  .task-filter select { flex:0 1 122px; min-width:96px; background:var(--panel-2); border:1px solid var(--line); color:var(--text); font-size:var(--fs-input, 15px); padding:0 10px; min-height:var(--tap); border-radius:var(--r-pill); }
  .task-filter input:focus, .task-filter select:focus { border-color:var(--cyan); outline:none; }
  .task-pager { display:flex; align-items:center; justify-content:space-between; gap:var(--s2); padding:var(--s2) 0 var(--s3); }
  .task-pager button { font-family:var(--mono); font-size:12px; background:var(--panel-2); border:1px solid var(--line); color:var(--cyan); padding:0 18px; min-height:var(--tap); min-width:88px; border-radius:var(--r-pill); cursor:pointer; }
  .task-pager button[disabled] { opacity:0.3; color:var(--text-faint); cursor:default; }
  .task-pager .pg-info { font-family:var(--mono); font-size:11px; color:var(--text-dim); letter-spacing:0.05em; }
  .msg.error { color:var(--red); }
  footer.page { margin-top:var(--s5); text-align:center; font-family:var(--mono); font-size:10px; color:var(--text-faint); padding-bottom:var(--s2); }

  body.is-loading .ring-grid, body.is-loading .card, body.is-loading .hero-ring-wrap { animation:skeleton-pulse 1.3s ease-in-out infinite; }
  @keyframes skeleton-pulse { 0%,100%{opacity:1;} 50%{opacity:0.55;} }
  @media (prefers-reduced-motion: reduce) { body.is-loading .ring-grid, body.is-loading .card, body.is-loading .hero-ring-wrap { animation:none; } }

  .bottom-nav { position:fixed; left:var(--dock-gap); right:var(--dock-gap); bottom:calc(var(--dock-gap) + var(--safe-b)); max-width:448px; margin:0 auto; z-index:100; display:flex; background:var(--dock-bg); backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px); border:1px solid var(--line); border-radius:var(--r-pill); box-shadow:var(--elev-dock); padding:6px; }
  .nav-btn { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px; background:none; border:none; cursor:pointer; min-height:calc(var(--dock-h) - 12px); border-radius:var(--r-pill); color:var(--text-dim); font-family:var(--mono); font-size:9.5px; letter-spacing:0.06em; text-transform:uppercase; transition:all 0.16s ease; }
  .nav-btn .nav-icon { font-size:17px; line-height:1; }
  .nav-btn.active { background:linear-gradient(180deg, var(--cyan), var(--cyan-2)); color:var(--tab-ink); box-shadow:0 4px 18px var(--cyan-soft); }

  .toast-region { position:fixed; left:50%; bottom:calc(var(--dock-h) + var(--dock-gap) + var(--safe-b) + var(--s3)); transform:translateX(-50%); z-index:9999; display:flex; flex-direction:column; gap:var(--s2); align-items:center; pointer-events:none; width:max-content; max-width:92vw; }
  .toast { font-family:var(--mono); font-size:12.5px; padding:12px 18px; border:1px solid var(--line); border-left-width:3px; border-radius:var(--r-pill); background:var(--panel-2); color:var(--text); box-shadow:var(--elev-2); opacity:0; transform:translateY(10px); transition:opacity 0.25s ease, transform 0.25s ease; }
  .toast.show { opacity:1; transform:translateY(0); }
  .toast-error { border-left-color:var(--red); color:var(--red); }
  .toast-success { border-left-color:var(--green); color:var(--green); }
  .toast-reward { border-left-color:var(--cyan); color:var(--cyan); font-weight:600; }
  .toast-info { border-left-color:var(--cyan); }
  @media (prefers-reduced-motion: reduce) { .toast { transition:opacity 0.2s ease; transform:none; } }

  .levelup { position:fixed; inset:0; z-index:10000; display:flex; align-items:center; justify-content:center; pointer-events:none; background:radial-gradient(circle at 50% 45%, var(--cyan-soft), transparent 60%); opacity:0; transition:opacity 0.4s ease; }
  .levelup.show { opacity:1; }
  .levelup-card { background:var(--panel); border:1px solid var(--cyan); border-radius:var(--r-xl); padding:var(--s6) var(--s5); text-align:center; box-shadow:0 0 60px var(--cyan-soft), var(--elev-2); transform:scale(0.9); transition:transform 0.4s cubic-bezier(.34,1.5,.5,1); }
  .levelup.show .levelup-card { transform:scale(1); }
  .levelup-k { font-family:var(--mono); font-size:11px; letter-spacing:0.3em; text-transform:uppercase; color:var(--cyan); }
  .levelup-title { font-family:var(--mono); font-size:28px; font-weight:700; color:var(--text); margin-top:var(--s3); text-shadow:0 0 24px var(--num-glow); }
  @media (prefers-reduced-motion: reduce) { .levelup, .levelup-card { transition:opacity 0.2s ease; transform:none; } }

  .visually-hidden { position:absolute; width:1px; height:1px; margin:-1px; padding:0; overflow:hidden; clip:rect(0 0 0 0); white-space:nowrap; border:0; }
</style>
</head>
<body>

<div class="wrap">
  <div class="hero">
    <div class="hero-top">
      <div>
        <div class="wordmark">BUILDER<span>OS</span></div>
        <div class="sync-date" id="syncDate">--</div>
        <div class="boot-line" id="bootStatus">SYNCING</div>
      </div>
      <div class="head-btns">
        <button class="icon-btn" id="themeToggle" type="button" aria-pressed="true" aria-label="Toggle light or dark theme"><span class="tt-icon">☀</span></button>
        <button class="icon-btn" id="refreshBtn" type="button" aria-label="Refresh data">↻</button>
      </div>
    </div>
    <div class="hero-ring-wrap" id="heroRing">
      <div class="hero-center">
        <div class="hero-level" id="levelNum">--</div>
        <div class="hero-title" id="levelTitle">LOADING</div>
        <div class="hero-sub" id="heroSub">INDEX --</div>
      </div>
    </div>
    <div class="tier-next"><span class="lock" aria-hidden="true">🔒</span>NEXT ▸ <span id="nextTier">--</span> · <span id="nextPts"></span></div>
  </div>

  <section id="view-dashboard" class="view active" role="tabpanel" aria-labelledby="nav-dashboard">
    <div class="alarm-strip nominal" id="alarmStrip"><span class="alarm-dot"></span><span class="alarm-label" id="alarmLabel">SYSTEMS NOMINAL</span></div>
    <div class="section-label">Pillar Status</div>
    <div class="ring-grid" id="statGrid"></div>
    <div class="section-label">Today's Tasks</div>
    <div class="task-filter">
      <input type="search" id="mTaskSearch" placeholder="Filter tasks…" aria-label="Filter tasks" />
      <select id="mTaskDomain" aria-label="Filter by domain"><option value="">All</option></select>
    </div>
    <div class="card" style="padding:2px 16px;">
      <div id="taskList"><div class="msg">Loading…</div></div>
      <div class="task-pager" id="mTaskPager" hidden></div>
    </div>
  </section>

  <section id="view-alcohol" class="view" role="tabpanel" aria-labelledby="nav-alcohol" hidden>
    <div class="section-label">Log Alcohol</div>
    <div class="card">
      <div class="field-row">
        <div class="field"><label for="drinkType">Type</label><input type="text" id="drinkType" placeholder="Beer" /></div>
        <div class="field"><label for="drinkVolume">Vol (ml)</label><input type="number" id="drinkVolume" placeholder="330" /></div>
        <div class="field"><label for="drinkAbv">ABV %</label><input type="number" id="drinkAbv" placeholder="5.0" step="0.1" /></div>
      </div>
      <div class="quick-btn-row"><button class="qbtn confirm" id="logDrinkBtn" type="button">+ Log Drink</button></div>
    </div>
    <div class="section-label">Last 7 Days</div>
    <div class="card" style="padding:2px 16px;"><div id="alcoholList"><div class="msg">Loading…</div></div></div>
  </section>

  <section id="view-water" class="view" role="tabpanel" aria-labelledby="nav-water" hidden>
    <div class="section-label">Water — Today</div>
    <div class="card">
      <div class="water-readout">
        <div class="water-total" id="waterTotal">--<span class="tunit">L</span></div>
        <div class="water-goal-label">of <span id="waterGoal">2.5</span>L target</div>
        <div class="water-bar-track"><div class="water-bar-fill" id="waterBarFill"></div></div>
      </div>
      <div class="quick-btn-row">
        <button class="qbtn" data-amount="0.25" type="button">+250</button>
        <button class="qbtn" data-amount="0.5" type="button">+500</button>
        <button class="qbtn" data-amount="0.75" type="button">+750</button>
      </div>
      <div class="field-row">
        <div class="field"><label for="waterCustom">Custom (L)</label><input type="number" id="waterCustom" placeholder="0.3" step="0.1" /></div>
        <div class="field" style="justify-content:flex-end;"><button class="qbtn confirm" id="logWaterCustomBtn" type="button" style="min-width:auto;">+ Add</button></div>
      </div>
    </div>
  </section>

  <footer class="page">BUILDER OS · mobile · <a href="index.html">Full dashboard →</a></footer>
</div>

<nav class="bottom-nav" role="tablist" aria-label="Sections">
  <button class="nav-btn active" id="nav-dashboard" role="tab" aria-selected="true" aria-controls="view-dashboard" type="button"><span class="nav-icon" aria-hidden="true">◉</span>Status</button>
  <button class="nav-btn" id="nav-alcohol" role="tab" aria-selected="false" aria-controls="view-alcohol" tabindex="-1" type="button"><span class="nav-icon" aria-hidden="true">◔</span>Alcohol</button>
  <button class="nav-btn" id="nav-water" role="tab" aria-selected="false" aria-controls="view-water" tabindex="-1" type="button"><span class="nav-icon" aria-hidden="true">◇</span>Water</button>
</nav>

<div id="toastRegion" class="toast-region" aria-live="polite" aria-atomic="false"></div>
<div id="srLive" class="visually-hidden" aria-live="polite"></div>

<script src="config.js"></script>
<script src="api.js"></script>
<script>
const prefersReduced = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;

/* TIER MODEL now lives in api.js (hydrated from backend CONFIG). */

const THEME_KEY='builderos-theme';
function applyTheme(t){ document.documentElement.setAttribute('data-theme',t); const m=document.querySelector('meta[name=theme-color]'); if(m)m.setAttribute('content',t==='light'?'#EAF0F5':'#0A0F15'); const btn=document.getElementById('themeToggle'); if(btn){ btn.setAttribute('aria-pressed',String(t==='dark')); const ic=btn.querySelector('.tt-icon'); if(ic)ic.textContent=t==='light'?'☾':'☀'; } try{localStorage.setItem(THEME_KEY,t);}catch(e){} }
function toggleTheme(){ const cur=document.documentElement.getAttribute('data-theme')||'dark'; applyTheme(cur==='dark'?'light':'dark'); }
applyTheme(document.documentElement.getAttribute('data-theme')||'dark');
document.getElementById('themeToggle').addEventListener('click', toggleTheme);

function showToast(message,type){ announce(message); const region=document.getElementById('toastRegion'); if(!region){console.warn(message);return;} const el=document.createElement('div'); el.className='toast toast-'+(type||'info'); el.setAttribute('role',type==='error'?'alert':'status'); el.textContent=message; region.appendChild(el); requestAnimationFrame(()=>el.classList.add('show')); setTimeout(()=>{el.classList.remove('show'); setTimeout(()=>el.remove(),300);}, type==='error'?5000:3200); }
function announce(m){ const l=document.getElementById('srLive'); if(l){ l.textContent=''; requestAnimationFrame(()=>{ l.textContent=m; }); } }

function rewardFeedback(task, delta){ const pts=delta?(Number(delta.points_awarded)||0)+(Number(delta.points_secondary)||0):(Number(task.points_on_time)||0); const stats=delta?[delta.stat_awarded,delta.stat_secondary].filter(Boolean):[task.stat_primary,task.stat_secondary].filter(Boolean); const late=delta&&String(delta.on_time).toUpperCase()==='NO'?' (late)':''; showToast(`+${pts} pts${late}`+(stats.length?' → '+stats.join(' · '):''),'reward'); pulseRings(stats); }
function pulseRings(labels){ if(prefersReduced)return; (labels||[]).forEach(lbl=>{ const cell=document.querySelector(`.ring-cell[data-stat="${String(lbl).toUpperCase()}"]`); if(cell){ cell.classList.remove('ring-hit'); void cell.offsetWidth; cell.classList.add('ring-hit'); setTimeout(()=>cell.classList.remove('ring-hit'),950); } }); }

let lastLevel=null;
function celebrate(title){ const ov=document.createElement('div'); ov.className='levelup'; ov.innerHTML=`<div class="levelup-card"><div class="levelup-k">Level Up</div><div class="levelup-title">${(title||'').toString().replace(/</g,'')}</div></div>`; document.body.appendChild(ov); announce('Level up. New title '+(title||'')); requestAnimationFrame(()=>ov.classList.add('show')); setTimeout(()=>{ ov.classList.remove('show'); setTimeout(()=>ov.remove(),450); },2600); }

const BOOT_MESSAGES=['SYNCING','PULLING STATS','CHECKING TASKS']; let bootInterval=null;
function startBootSequence(){ document.body.classList.add('is-loading'); const el=document.getElementById('bootStatus'); let i=0; el.textContent=BOOT_MESSAGES[0]; clearInterval(bootInterval); bootInterval=setInterval(()=>{ i=(i+1)%BOOT_MESSAGES.length; el.textContent=BOOT_MESSAGES[i]; },500); }
function stopBootSequence(){ clearInterval(bootInterval); bootInterval=null; document.body.classList.remove('is-loading'); }

function ringSVG(value,colorVar,size,stroke,ariaLabel,tickAt){
  const v=Math.max(0,Math.min(100,Number(value)||0)); const r=(size-stroke)/2,cx=size/2,cy=size/2;
  const circ=2*Math.PI*r, offset=circ*(1-v/100); const safe=(ariaLabel||'ring').replace(/"/g,'');
  let tick=''; if(tickAt!=null){ const a=(-90+360*(tickAt/100))*Math.PI/180; const r1=r-stroke/2-1,r2=r+stroke/2+1; tick=`<line class="ring-tick" x1="${(cx+r1*Math.cos(a)).toFixed(1)}" y1="${(cy+r1*Math.sin(a)).toFixed(1)}" x2="${(cx+r2*Math.cos(a)).toFixed(1)}" y2="${(cy+r2*Math.sin(a)).toFixed(1)}" stroke-width="2"/>`; }
  return `
  <svg class="ring-svg" width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" role="img" aria-label="${safe}">
    <title>${safe}</title>
    <circle class="ring-track" cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke-width="${stroke}"/>
    <circle class="ring-prog" cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke-width="${stroke}" stroke-linecap="round" stroke-dasharray="${circ.toFixed(2)}" stroke-dashoffset="${circ.toFixed(2)}" data-off="${offset.toFixed(2)}" style="stroke:var(${colorVar}); --glow:var(${colorVar});"/>
    ${tick}
  </svg>`;
}
function countUp(el,to,dur){ if(isNaN(to))return; if(prefersReduced){ el.textContent=String(to); return; } const start=performance.now(); function tick(now){ const p=Math.min(1,(now-start)/dur); const e=1-Math.pow(1-p,3); el.textContent=String(Math.round(to*e)); if(p<1)requestAnimationFrame(tick); } requestAnimationFrame(tick); }
function animateRings(root){ const run=()=>{ root.querySelectorAll('.ring-prog').forEach(c=>{ c.style.strokeDashoffset=c.dataset.off; }); root.querySelectorAll('.ring-val[data-count]').forEach(v=>countUp(v,Number(v.dataset.count),850)); }; if(prefersReduced){ run(); } else { requestAnimationFrame(()=>requestAnimationFrame(run)); } }

function renderHero(stats){
  const vals=STAT_KEYS.map(s=>Number(stats[s.key])).filter(v=>!isNaN(v));
  const index=vals.length?Math.round(vals.reduce((a,b)=>a+b,0)/vals.length):0;
  document.getElementById('levelNum').textContent=stats.builder_level ?? '--';
  document.getElementById('levelTitle').textContent=stats.builder_title || '--';
  document.getElementById('heroSub').textContent='INDEX '+index;
  const tier=nextTierFor(index);
  document.getElementById('nextTier').textContent=tier.next?tier.next.name:'MAX TIER';
  document.getElementById('nextPts').textContent=tier.next?(tier.ptsToNext+' to go'):'peak';
  const ring=document.getElementById('heroRing'); const existing=ring.querySelector('.ring-svg'); if(existing)existing.remove();
  ring.insertAdjacentHTML('afterbegin', ringSVG(index,'--ring-hero',150,12,`Builder index ${index} of 100`, tier.next?tier.next.floor:null));
  animateRings(ring);
  const lvl=Number(stats.builder_level);
  if(lastLevel!==null && !isNaN(lvl) && lvl>lastLevel) celebrate(stats.builder_title);
  if(!isNaN(lvl)) lastLevel=lvl;
}

function renderStatGrid(stats,decayFlags){
  const grid=document.getElementById('statGrid');
  if(!stats){ grid.innerHTML='<div class="msg" style="grid-column:1/-1;">No stat data yet.</div>'; return; }
  const flags=(decayFlags||'').toUpperCase();
  grid.innerHTML=STAT_KEYS.map(s=>{
    const raw=stats[s.key]; const valNum=Number(raw)||0;
    const isDecaying=s.decayKey && flags.includes(s.decayKey); const isCritical=valNum<20;
    let cellClass='flag-ok', colorVar='--ring-ok';
    if(isCritical){ cellClass='flag-critical'; colorVar='--ring-crit'; } else if(isDecaying){ cellClass='flag-decay'; colorVar='--ring-decay'; }
    const numeric=!(raw===''||raw==null||isNaN(Number(raw)));
    const display=numeric?raw:'--';
    const centerVal=numeric?`<span class="ring-val" data-count="${valNum}">0</span>`:`<span class="ring-val">--</span>`;
    const flagMark=isCritical?'<span class="ring-flag crit" title="Low">▼</span>':isDecaying?'<span class="ring-flag decay" title="Decaying">▲</span>':'';
    const stateWord=isCritical?', low':isDecaying?', decaying':'';
    return `
      <div class="ring-cell ${cellClass}" data-stat="${s.label}">
        ${flagMark}
        <div class="ring-wrap">
          ${ringSVG(valNum,colorVar,78,7,`${s.label} ${display}${stateWord}`)}
          <div class="ring-center">${centerVal}</div>
        </div>
        <div class="ring-label">${s.label}</div>
      </div>`;
  }).join('');
  animateRings(grid);
}

function renderAlarms(decayFlags,pillarCap){
  const strip=document.getElementById('alarmStrip'); const flags=(decayFlags||'').trim();
  if(!flags && pillarCap!=='YES'){ strip.className='alarm-strip nominal'; strip.innerHTML=`<span class="alarm-dot"></span><span class="alarm-label">SYSTEMS NOMINAL</span>`; return; }
  strip.className='alarm-strip active';
  const chips=flags.split(/\s+/).filter(Boolean).map(f=>`<span class="alarm-chip">${f}</span>`).join('');
  strip.innerHTML=`<span class="alarm-dot"></span><span class="alarm-label">ALERT</span>${chips}`+(pillarCap==='YES'?'<span class="alarm-chip">PILLAR-CAP</span>':'');
}

function initBottomNav(){
  const nav=document.querySelector('.bottom-nav'); const tabs=Array.from(nav.querySelectorAll('[role="tab"]'));
  function select(tab){ tabs.forEach(t=>{ const on=t===tab; t.setAttribute('aria-selected',on?'true':'false'); t.tabIndex=on?0:-1; t.classList.toggle('active',on); const view=document.getElementById(t.getAttribute('aria-controls')); if(view){ view.classList.toggle('active',on); view.hidden=!on; } }); window.scrollTo({top:0}); }
  tabs.forEach((tab,i)=>{ tab.addEventListener('click',()=>{ select(tab); tab.focus(); }); tab.addEventListener('keydown',(e)=>{ let idx=null; if(e.key==='ArrowRight')idx=(i+1)%tabs.length; else if(e.key==='ArrowLeft')idx=(i-1+tabs.length)%tabs.length; else if(e.key==='Home')idx=0; else if(e.key==='End')idx=tabs.length-1; if(idx!==null){ e.preventDefault(); select(tabs[idx]); tabs[idx].focus(); } }); });
}
initBottomNav();

let WATER_GOAL_L=2.5; // fallback; overwritten from CONFIG's weight-based 'Water Target (L)' on load
function renderWater(health){ const total=health?Number(health.water)||0:0; document.getElementById('waterTotal').innerHTML=total.toFixed(2)+'<span class="tunit">L</span>'; const goalEl=document.getElementById('waterGoal'); if(goalEl)goalEl.textContent=WATER_GOAL_L.toFixed(1); document.getElementById('waterBarFill').style.width=Math.min(100,(total/WATER_GOAL_L)*100)+'%'; }
async function logWater(amountLitres){ if(!amountLitres||amountLitres<=0){ showToast('Enter a valid amount.','error'); return; } const result=await apiPost('log_water',{amount_litres:amountLitres}); if(result.error){ showToast('Log failed: '+result.error,'error'); return; } showToast(`+${amountLitres} L water`,'reward'); loadAll(); }
document.querySelectorAll('[data-amount]').forEach(btn=>{ btn.addEventListener('click',()=>logWater(Number(btn.dataset.amount))); });
document.getElementById('logWaterCustomBtn').addEventListener('click',()=>{ const i=document.getElementById('waterCustom'); logWater(Number(i.value)); i.value=''; });

async function logDrink(){
  const type=document.getElementById('drinkType').value.trim(); const volume=document.getElementById('drinkVolume').value; const abv=document.getElementById('drinkAbv').value;
  if(!type||!volume){ showToast('Type and volume are required.','error'); return; }
  const btn=document.getElementById('logDrinkBtn'); btn.textContent='...';
  const result=await apiPost('log_drink',{drink_type:type,volume_ml:Number(volume)||0,abv_pct:Number(abv)||0,session_id:'NEW'});
  btn.textContent='+ Log Drink';
  if(result.error){ showToast('Log failed: '+result.error,'error'); return; }
  document.getElementById('drinkType').value=''; document.getElementById('drinkVolume').value=''; document.getElementById('drinkAbv').value='';
  showToast('Drink logged','success'); loadAll();
}
document.getElementById('logDrinkBtn').addEventListener('click', logDrink);

function renderAlcoholList(sessions){ const list=document.getElementById('alcoholList'); const rows=(sessions||[]).slice().sort((a,b)=>new Date(b.drink_ts)-new Date(a.drink_ts)); if(!rows.length){ list.innerHTML='<div class="msg">No drinks logged in the last 7 days.</div>'; return; } list.innerHTML=rows.map(s=>`<div class="alc-row"><span class="alc-date">${esc(String(s.date).substring(5))}</span><span class="alc-type">${esc(s.drink_type)} · ${esc(s.volume_ml)}ml</span><span class="alc-units">${esc(s.units)}u</span></div>`).join(''); }

/* Task list: 6 headline items per page, filterable. State survives re-renders;
   allTasks refreshes on loadAll. */
const M_PAGE_SIZE=6;
let mAllPending=[], mLoadedOnce=false;
const mFilter={ q:'', domain:'', page:1 };
function renderTasks(tasks){
  if(tasks!==undefined){
    mLoadedOnce=true;
    mAllPending=(tasks||[]).filter(t=>t.task_id && (t.status||'').toUpperCase()!=='COMPLETE' && (t.status||'').toUpperCase()!=='CANCELLED').sort((a,b)=>new Date(a.due_date||'9999-12-31')-new Date(b.due_date||'9999-12-31'));
    // hydrate domain filter options once per data load, keep selection
    const dsel=document.getElementById('mTaskDomain');
    if(dsel){
      const doms=[...new Set(mAllPending.map(t=>String(t.domain||'').toUpperCase()).filter(Boolean))].sort();
      const cur=dsel.value;
      dsel.innerHTML='<option value="">All</option>'+doms.map(d=>`<option value="${d}">${d}</option>`).join('');
      if(doms.includes(cur))dsel.value=cur;
    }
  }
  const list=document.getElementById('taskList');
  const q=mFilter.q.trim().toLowerCase();
  let rows=mAllPending;
  if(q) rows=rows.filter(t=>[t.task_id,t.task_name,t.domain,t.stat_primary,t.stat_secondary].some(v=>String(v||'').toLowerCase().includes(q)));
  if(mFilter.domain) rows=rows.filter(t=>String(t.domain||'').toUpperCase()===mFilter.domain);
  const totalPages=Math.max(1,Math.ceil(rows.length/M_PAGE_SIZE));
  if(mFilter.page>totalPages)mFilter.page=totalPages;
  if(mFilter.page<1)mFilter.page=1;
  const pageRows=rows.slice((mFilter.page-1)*M_PAGE_SIZE, mFilter.page*M_PAGE_SIZE);
  const pager=document.getElementById('mTaskPager');
  if(!mAllPending.length){ list.innerHTML=mLoadedOnce?'<div class="msg">Nothing pending — clean board.</div>':'<div class="msg error">Couldn\'t load tasks — tap refresh.</div>'; if(pager)pager.hidden=true; return; }
  if(!rows.length){ list.innerHTML='<div class="msg">No tasks match the filter.</div>'; if(pager)pager.hidden=true; return; }
  const today=new Date(); today.setHours(0,0,0,0);
  list.innerHTML=pageRows.map(t=>{ const due=t.due_date?String(t.due_date).substring(0,10):''; const isOverdue=due&&/^\d{4}-\d{2}-\d{2}$/.test(due)&&new Date(due)<today; return `<div class="task-row" data-task-id="${esc(t.task_id)}"><span class="task-domain">${esc(t.domain)}</span><span class="task-name">${esc(t.task_name)}</span><span class="task-due ${isOverdue?'overdue':''}">${due||''}</span><button class="task-done-btn" data-action="done" aria-label="Mark ${esc(t.task_name)} done">Done</button></div>`; }).join('');
  if(pager){
    if(totalPages<=1){ pager.hidden=true; pager.innerHTML=''; }
    else {
      pager.hidden=false;
      pager.innerHTML=`<button type="button" id="mPgPrev" ${mFilter.page<=1?'disabled':''}>‹ Prev</button><span class="pg-info">${mFilter.page} / ${totalPages}</span><button type="button" id="mPgNext" ${mFilter.page>=totalPages?'disabled':''}>Next ›</button>`;
      pager.querySelector('#mPgPrev')?.addEventListener('click',()=>{ mFilter.page--; renderTasks(); });
      pager.querySelector('#mPgNext')?.addEventListener('click',()=>{ mFilter.page++; renderTasks(); });
    }
  }
  list.querySelectorAll('[data-action="done"]').forEach((btn,i)=>{
    btn.addEventListener('click', async ()=>{
      const row=btn.closest('.task-row'); const taskId=row.dataset.taskId; const task=mAllPending.find(p=>String(p.task_id)===String(taskId)); btn.textContent='...';
      const result=await apiPost('update_task',{task_id:taskId,status:'COMPLETE'});
      if(result.error){ showToast('Update failed: '+result.error,'error'); btn.textContent='Done'; return; }
      btn.textContent='✓'; btn.classList.add('done'); btn.disabled=true; row.style.opacity='0.5';
      if(task) rewardFeedback(task, result.awarded); else showToast('Task marked done','success');
    });
  });
}
function esc(v){ if(v===null||v===undefined)return ''; return String(v).replace(/"/g,'&quot;'); }
(function wireMobileTaskFilter(){
  const s=document.getElementById('mTaskSearch'), d=document.getElementById('mTaskDomain');
  if(!s)return;
  s.addEventListener('input',()=>{ mFilter.q=s.value; mFilter.page=1; renderTasks(); });
  d.addEventListener('change',()=>{ mFilter.domain=d.value; mFilter.page=1; renderTasks(); });
})();

async function loadAll(){
  startBootSequence();
  try{
    const results=await Promise.allSettled([hydrateConfig(),apiGet('today_stats'),apiGet('today_health'),apiGet('tasks'),apiGet('alcohol_week')]);
    const unwrap=(r,fb={})=>r.status==='fulfilled'?r.value:fb;
    const cfgRes=(results[0].status==='fulfilled')?results[0].value:null;
    if(cfgRes&&cfgRes.targets&&Number(cfgRes.targets.water_l)>0)WATER_GOAL_L=Number(cfgRes.targets.water_l);
    const statsRes=unwrap(results[1]),healthRes=unwrap(results[2]),tasksRes=unwrap(results[3]),alcoholRes=unwrap(results[4]);
    results.forEach((r,i)=>{ if(r.status==='rejected')console.warn(`Builder OS mobile: call ${i} failed —`,r.reason); });
    const stats=statsRes.stats;
    if(stats){ document.getElementById('syncDate').textContent=stats.date||'--'; renderHero(stats); renderStatGrid(stats,stats.decay_flags); renderAlarms(stats.decay_flags,stats.pillar_cap); }
    else { renderStatGrid(null); }
    renderWater(healthRes.health); renderTasks(tasksRes.tasks); renderAlcoholList(alcoholRes.sessions);
  }catch(err){ document.getElementById('statGrid').innerHTML=`<div class="msg error" style="grid-column:1/-1;">Could not reach Builder OS backend.</div>`; showToast('Could not reach the backend.','error'); console.error(err); }
  finally{ stopBootSequence(); }
}

document.getElementById('refreshBtn').addEventListener('click', loadAll);
AUTH.init(loadAll);

if('serviceWorker' in navigator){ window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{})); }
</script>
